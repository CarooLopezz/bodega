<form
  action="{{ url_for('users.edit_user', id=user.id) }}" 
  method="POST"
  class="card bg-black text-light"
>
  <div class="card-body p-4">
    <h1 class="h5 mb-4">Edit User</h1>

    <div class="mb-3">
      <label for="username"> Username:</label>
      <input
        type="text"
        id="username"
        name="username"
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="User Name"
        autofocus
        required
        value="{{ user.username }}" 
      />
    </div>

    <div class="mb-3">
      <label for="email">Email:</label>
      <input
        type="email"
        id="email"
        name="email"
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="User Email"
        required
        value="{{ user.email }}" 
    </div>

    <div class="mb-3">
      <label for="password">New Password (leave blank to keep current):</label>
      <input
        type="password"
        id="password"
        name="password" 
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="New Password"
      />
    </div>

    <div class="mb-3">
      <label for="role">Role:</label>
      <select
        id="role"
        name="role"
        class="form-select rounded-0 bg-dark border-0 text-white"
      >
        <option value="user" {% if user.role == 'user' %}selected{% endif %}>User</option>
        <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
      </select>
    </div>

    <button class="btn btn-primary">Update User</button>
  </div>
</form>
