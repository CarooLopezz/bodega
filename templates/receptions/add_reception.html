<form
  action="{{ url_for('receptions.add_reception') }}" 
  method="POST"
  class="card bg-black text-light"
>
  <div class="card-body p-4">
    <h1 class="h5 mb-4">Add Reception</h1>

    <div class="mb-3">
      <label for="variety">Variety:</label>
      <input
        type="text"
        id="variety"
        name="variety" 
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="Variety"
        required
        autofocus
      />
    </div>

    <div class="mb-3">
      <label for="start_reception">Start Reception Date:</label>
      <input
        type="date" {# Tipo date para un selector de fecha #}
        id="start_reception"
        name="start_reception" 
        class="form-control rounded-0 bg-dark border-0 text-white"
        required
      />
    </div>

    <div class="mb-3">
      <label for="end_reception">End Reception Date:</label>
      <input
        type="date"
        id="end_reception"
        name="end_reception"
        class="form-control rounded-0 bg-dark border-0 text-white"
      />
    </div>

    <div class="mb-3">
      <label for="weight">Weight (kg):</label>
      <input
        type="number" 
        step="0.01" {# Permite decimales #}
        id="weight"
        name="weight"
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="Weight in kg"
        required
      />
    </div>

    <div class="mb-3">
      <label for="acidity">Acidity:</label>
      <input
        type="number"
        step="0.01"
        id="acidity"
        name="acidity" 
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="Acidity"
        required
      />
    </div>

    <div class="mb-3">
      <label for="ph">pH:</label>
      <input
        type="number"
        step="0.01"
        id="ph"
        name="ph" 
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="pH"
        required
      />
    </div>

    <button class="btn btn-primary">Save Reception</button>
  </div>
</form>
