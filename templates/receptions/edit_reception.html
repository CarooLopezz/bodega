<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Recepción</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        /* Estilos similares a tu ejemplo de Wines */
        body { background-color: #343a40; color: #f8f9fa; }
        .card { background-color: #212529; border-color: #495057; }
        .form-control { background-color: #495057; color: #f8f9fa; border: none; }
        .form-control:focus { background-color: #5a6268; color: #f8f9fa; border-color: #007bff; box-shadow: 0 0 0 0.25rem rgba(0, 123, 255, 0.25); }
        .btn-primary { background-color: #007bff; border-color: #007bff; }
        .btn-primary:hover { background-color: #0056b3; border-color: #0056b3; }
        .btn-secondary { background-color: #6c757d; border-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; border-color: #5a6268; }
        .alert { margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <form action="{{ url_for('receptions.edit_reception', id=reception.id) }}" method="POST" class="card bg-black text-light">
            <div class="card-body p-4">
                <h1 class="h5 mb-4">Editar Recepción</h1>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <div class="mb-3">
                    <label for="variety">Variedad:</label>
                    <input
                        type="text"
                        name="variety"
                        class="form-control rounded-0 bg-dark border-0 text-white"
                        placeholder="Variedad de la uva"
                        value="{{ reception.variety }}"
                        required
                    />
                </div>

                <div class="mb-3">
                    <label for="start_reception">Fecha de Inicio de Recepción:</label>
                    <input
                        type="date"
                        name="start_reception"
                        class="form-control rounded-0 bg-dark border-0 text-white"
                        value="{{ reception.start_reception.strftime('%Y-%m-%d') if reception.start_reception else '' }}"
                        required
                    />
                </div>

                <div class="mb-3">
                    <label for="end_reception">Fecha de Fin de Recepción:</label>
                    <input
                        type="date"
                        name="end_reception"
                        class="form-control rounded-0 bg-dark border-0 text-white"
                        value="{{ reception.end_reception.strftime('%Y-%m-%d') if reception.end_reception else '' }}"
                        required
                    />
                </div>

                <div class="mb-3">
                    <label for="weight">Peso (kg):</label>
                    <input
                        type="number"
                        step="0.01"
                        name="weight"
                        class="form-control rounded-0 bg-dark border-0 text-white"
                        placeholder="Ej: 1000.50"
                        value="{{ '%.2f' % reception.weight }}" {# Formato a 2 decimales #}
                        required
                    />
                </div>

                <div class="mb-3">
                    <label for="acidity">Acidez:</label>
                    <input
                        type="number"
                        step="0.01"
                        name="acidity"
                        class="form-control rounded-0 bg-dark border-0 text-white"
                        placeholder="Ej: 3.20"
                        value="{{ '%.2f' % reception.acidity }}" {# Formato a 2 decimales #}
                        required
                    />
                </div>

                <div class="mb-3">
                    <label for="ph">pH:</label>
                    <input
                        type="number"
                        step="0.01"
                        name="ph"
                        class="form-control rounded-0 bg-dark border-0 text-white"
                        placeholder="Ej: 3.50"
                        value="{{ '%.2f' % reception.ph }}" {# Formato a 2 decimales #}
                        required
                    />
                </div>

                <button type="submit" class="btn btn-primary">Actualizar Recepción</button>
                <a href="{{ url_for('receptions.get_receptions') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
