<form
  action="{{ url_for('receptions.edit_reception', id=reception.id) }}"
  method="POST"
  class="card bg-black text-light"
>
  <div class="card-body p-4">
    <h1 class="h5 mb-4">Edit Reception</h1>

    <div class="mb-3">
      <label for="variety">Variety:</label>
      <input
        type="text"
        id="variety"
        name="variety"
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="Variety"
        required
        autofocus
        value="{{ reception.variety }}" {# Muestra el valor actual de la variedad #}
      />
    </div>

    <div class="mb-3">
      <label for="start_reception">Start Reception Date:</label>
      <input
        type="date"
        id="start_reception"
        name="start_reception"
        class="form-control rounded-0 bg-dark border-0 text-white"
        required
        value="{{ reception.start_reception.strftime('%Y-%m-%d') if reception.start_reception else '' }}" {# Formato YYYY-MM-DD y maneja None #}
      />
    </div>

    <div class="mb-3">
      <label for="end_reception">End Reception Date:</label>
      <input
        type="date"
        id="end_reception"
        name="end_reception"
        class="form-control rounded-0 bg-dark border-0 text-white"
        value="{{ reception.end_reception.strftime('%Y-%m-%d') if reception.end_reception else '' }}" {# Formato YYYY-MM-DD y maneja None #}
        class="form-control rounded-0 bg-dark border-0 text-white"
      />
    </div>

    <div class="mb-3">
      <label for="weight">Weight (kg):</label>
      <input
        type="number"
        step="0.01"
        id="weight"
        name="weight"
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="Weight in kg"
        required
        value="{{ reception.weight }}" {# Muestra el valor actual del peso #}
      />
    </div>

    <div class="mb-3">
      <label for="acidity">Acidity:</label>
      <input
        type="number"
        step="0.01"
        id="acidity"
        name="acidity"
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="Acidity"
        required
        value="{{ reception.acidity }}" {# Muestra el valor actual de la acidez #}
      />
    </div>

    <div class="mb-3">
      <label for="ph">pH:</label>
      <input
        type="number"
        step="0.01"
        id="ph"
        name="ph"
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="pH"
        required
        value="{{ reception.ph }}" {# Muestra el valor actual del pH #}
      />
    </div>

    <button class="btn btn-primary">Update Reception</button>
  </div>
</form>
