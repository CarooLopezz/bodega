<form
  action="/products/new"
  method="POST"
  enctype="multipart/form-data"
  class="card bg-black text-light"
>
  <div class="card-body p-4">
    <h1 class="h5 mb-4">Add Wines</h1>

    <div class="mb-3">
      <label for="fullname">Wines Name:</label>
      <input
        type="text"
        name="productName"
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="Product Name"
        autofocus
      />
    </div>

    <div class="mb-3">
      <label for="origen">Origen:</label>
      <input
        type="text"
        name="origen"
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="Origen"
        required
      />
    </div>

    <div class="mb-3">
      <label for="image">Product Image:</label>
      <input
        type="file"
        name="image"
        class="form-control rounded-0 bg-dark border-0 text-white"
      />
    </div>

    <button class="btn btn-primary">Save</button>
  </div>
</form>
