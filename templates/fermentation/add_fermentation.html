<form 
  action="/fermentacion/nueva"
  method="POST"
  enctype="multipart/form-data"
  class="card bg-black text-light"
>
  <div class="card-body p-4">
    <h1 class="h5 mb-4">Registrar Fermentación</h1>

    <div class="mb-3">
      <label for="productName">Nombre del Producto:</label>
      <input
        type="text"
        name="productName"
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="Nombre del producto"
        required
      />
    </div>

    <div class="mb-3">
      <label for="startDate">Fecha de Inicio:</label>
      <input
        type="date"
        name="startDate"
        class="form-control rounded-0 bg-dark border-0 text-white"
        required
      />
    </div>

    <div class="mb-3">
      <label for="temperature">Temperatura (°C):</label>
      <input
        type="number"
        step="0.1"
        name="temperature"
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="Temperatura"
        required
      />
    </div>

    <div class="mb-3">
      <label for="pH">pH:</label>
      <input
        type="number"
        step="0.1"
        name="pH"
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="pH"
      />
    </div>

    <div class="mb-3">
      <label for="acidity">Acidez:</label>
      <input
        type="number"
        step="0.1"
        name="acidity"
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="Acidez"
      />
    </div>

    <div class="mb-3">
      <label for="status">Estado:</label>
      <select
        name="status"
        class="form-select bg-dark text-white rounded-0"
        required
      >
        <option value="1">Activo</option>
        <option value="0">Finalizado</option>
      </select>
    </div>

    <button class="btn btn-primary">Guardar</button>
  </div>
</form>
