<form
  action="{{ url_for('wines.add_wine') }}" 
  method="POST"
  enctype="multipart/form-data"
  class="card bg-black text-light"
>
  <div class="card-body p-4">
    <h1 class="h5 mb-4">Storage</h1>

    <div class="mb-3">
      <label for="name"> Name:</label>
      <input
        type="text"
        id="name"
        name="name"
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="Wine Name"
        autofocus
      />
    </div>

    <div class="mb-3">
      <label for="origen">Origen:</label>
      <input
        type="text"
        id="origen"
        name="origen"
        class="form-control rounded-0 bg-dark border-0 text-white"
        placeholder="Origen"
        required
      />
    </div>

    <div class="mb-3">
      <label for="image">Image:</label>
      <input
        type="file"
        id="image"
        name="image"
        class="form-control rounded-0 bg-dark border-0 text-white"
      />
    </div>

    <button class="btn btn-primary">Save</button>
  </div>
</form>
