{% extends "layout.html" %}

{% block body %}
<div class="col-md-6 offset-md-3">
  <div class="card card-body bg-dark text-white mt-5">
    <h1 class="text-center">Editar Almacenamiento</h1>

    <form action="{{ url_for('storage.edit_process', id=storage.id) }}" method="POST">
      <div class="mb-3">
        <label for="productName">Nombre del Producto:</label>
        <input
          type="text"
          name="productName"
          value="{{ storage.productName }}"
          class="form-control bg-dark text-white rounded-0"
          required
        />
      </div>

      <div class="mb-3">
        <label for="location">Ubicación:</label>
        <input
          type="text"
          name="location"
          value="{{ storage.location }}"
          class="form-control bg-dark text-white rounded-0"
          required
        />
      </div>

      <div class="mb-3">
        <label for="capacity">Capacidad (unidades):</label>
        <input
          type="number"
          name="capacity"
          value="{{ storage.capacity }}"
          class="form-control bg-dark text-white rounded-0"
          required
        />
      </div>

      <div class="mb-3">
        <label for="conditions">Condiciones:</label>
        <textarea
          name="conditions"
          rows="3"
          class="form-control bg-dark text-white rounded-0"
        >{{ storage.conditions }}</textarea>
      </div>

      <div class="mb-3">
        <label for="status">Estado:</label>
        <select
          name="status"
          class="form-select bg-dark text-white rounded-0"
          required
        >
          <option value="1" {% if storage.status %}selected{% endif %}>Activo</option>
          <option value="0" {% if not storage.status %}selected{% endif %}>Inactivo</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary w-100">Actualizar</button>
    </form>
  </div>
</div>
{% endblock %}
